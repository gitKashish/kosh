name: CI and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm 
    steps:
      - name: Checkout Code
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false 

      - name: Run Tests
        run: go test -v ./...

  build-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout Code
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false 

      - name: Run GoReleaser
        # The https:// prefix is the magic key here!
        uses: https://github.com/goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITEA_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITHUB_TOKEN: ''