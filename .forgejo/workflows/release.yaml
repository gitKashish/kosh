name: CI and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # Triggers on version tags
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: go test -v ./...

  build-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for GoReleaser
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITEA_TOKEN: ${{ secrets.FORGEJO_TOKEN }}