name: CI and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      # Use the official Node image so the 'checkout' and 'setup-go' actions can run
      image: node:20-bookworm 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Tests
        # The 'setup-go' step above makes the 'go' command available here
        run: go test -v ./...

  build-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for changelogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          args: release --clean
        env:
          # Token from your Forgejo 'Settings > Applications'
          GITEA_TOKEN: ${{ secrets.FORGEJO_TOKEN }}